<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab — Navable</title>
  <link rel="stylesheet" href="../common/ui.css">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- Ambient Background -->
  <div class="newtab-bg" aria-hidden="true"></div>

  <!-- Logo -->
  <header class="newtab-header">
    <img src="../../assets/navable-logo.svg" alt="Navable" class="newtab-header__logo" height="28">
    <a class="btn-icon newtab-settings" href="../options/index.html" aria-label="Open settings" title="Settings">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.35.17.7.37 1 .6.32.25.7.4 1.1.4H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z"/>
      </svg>
    </a>
  </header>

  <!-- Main Content -->
  <main class="newtab-main">
    <!-- Greeting -->
    <h1 id="greeting" class="newtab-greeting" aria-live="polite">Good morning</h1>

    <!-- Clock -->
    <div id="clock" class="newtab-clock" aria-live="off">12:00</div>

    <!-- Search -->
    <form id="searchForm" class="newtab-search" action="https://www.google.com/search" method="GET" role="search">
      <svg class="newtab-search__icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="searchInput"
        class="input-field newtab-search__input"
        name="q"
        placeholder="Search or type a URL..."
        aria-label="Search or type a URL"
        autocomplete="off"
        autofocus
      >
    </form>

    <!-- Voice Access -->
    <section class="newtab-voice" aria-label="Voice navigation">
      <button type="button" id="btnMicToggle" class="mic-button mic-button--large" aria-label="Toggle microphone" aria-pressed="false">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <p id="micStatus" class="newtab-voice__status" aria-live="polite">Tap to start voice navigation</p>
    </section>
  </main>

  <section id="nameSetup" class="name-setup" aria-labelledby="nameSetupTitle" aria-hidden="true">
    <form id="nameSetupForm" class="name-setup__card">
      <h2 id="nameSetupTitle" class="name-setup__title">What should Navable call you?</h2>
      <label class="sr-only" for="nameSetupInput">Your name</label>
      <input id="nameSetupInput" class="input-field" type="text" autocomplete="name" maxlength="40" placeholder="Your name">
      <button class="btn-primary" type="submit">Save</button>
    </form>
  </section>

  <!-- Shortcuts Link -->
  <div class="newtab-shortcuts">
    <button type="button" id="openShortcuts" class="btn-icon" aria-label="Open keyboard shortcuts">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2" ry="2"/>
        <line x1="6" y1="8" x2="6" y2="8"/>
        <line x1="10" y1="8" x2="10" y2="8"/>
        <line x1="14" y1="8" x2="14" y2="8"/>
        <line x1="18" y1="8" x2="18" y2="8"/>
        <line x1="8" y1="12" x2="8" y2="12"/>
        <line x1="12" y1="12" x2="12" y2="12"/>
        <line x1="16" y1="12" x2="16" y2="12"/>
        <line x1="7" y1="16" x2="17" y2="16"/>
      </svg>
    </button>
  </div>

  <script src="../common/i18n.js"></script>
  <script src="../common/announce.js"></script>
  <script src="../common/speech.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
