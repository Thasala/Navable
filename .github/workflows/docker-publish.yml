name: Functional - Publish Backend Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: thasala/navable-backend
  RENDER_PRODUCTION_URL: https://navable.onrender.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/navable-backend" >> "$GITHUB_ENV"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: ${{ env.RENDER_PRODUCTION_URL }}

    steps:
      - name: Trigger Render production deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "Missing repo secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL" >/dev/null

      - name: Verify Render production health
        shell: bash
        run: |
          set -euo pipefail

          health_url="${RENDER_PRODUCTION_URL%/}/health"
          curl -fsS \
            --retry 30 \
            --retry-all-errors \
            --retry-delay 10 \
            "$health_url" >/dev/null

          echo "Render production health check passed: $health_url"
